# Railway: create two services from this repo — Web (start command below) and Worker
# (celery -A backend.celery_app worker -l info). Add Redis + set env vars in the dashboard.
[build]
builder = "NIXPACKS"

[deploy]
startCommand = "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
